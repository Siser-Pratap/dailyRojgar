name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check

  # ─── 2. Type check ───────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build -w packages/shared-types
          npm run build -w packages/shared-utils

      - name: Type check server
        run: npm run type-check -w apps/server

      - name: Type check client
        run: npm run type-check -w apps/client

  # ─── 3. Server tests ─────────────────────────────────────────────────────────
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/dailyrojgar_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_key_min_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_key_min_32_chars
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build -w packages/shared-types
          npm run build -w packages/shared-utils

      - name: Run server tests
        run: npm run test -w apps/server

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: apps/server/coverage/

  # ─── 4. Client tests ─────────────────────────────────────────────────────────
  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build -w packages/shared-types
          npm run build -w packages/shared-utils

      - name: Run client tests
        run: npm run test -w apps/client

  # ─── 5. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-server, test-client]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build entire workspace
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_SOCKET_URL: ''
          VITE_RAZORPAY_KEY_ID: placeholder
          VITE_APP_NAME: dailyRojgar

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: apps/client/dist/
          retention-days: 3

      - name: Upload server build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist/
          retention-days: 3

  # ─── 6. Deploy to staging (develop branch only) ──────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploy to staging — configure your hosting provider here"

  # ─── 7. Deploy to production (main branch only) ──────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploy to production — configure your hosting provider here"
